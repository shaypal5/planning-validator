name: reusable-planning-validator

on:
  workflow_call:
    inputs:
      config_path:
        required: true
        type: string
      python_version:
        required: false
        type: string
        default: "3.12"
    secrets:
      openai_api_key:
        required: false
      anthropic_api_key:
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      WORKFLOW_REF: ${{ github.workflow_ref }}
      GITHUB_TOKEN: ${{ github.token }}
      OPENAI_API_KEY: ${{ secrets.openai_api_key }}
      ANTHROPIC_API_KEY: ${{ secrets.anthropic_api_key }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          workflow_repository="${WORKFLOW_REF%%/.github/workflows/*}"
          workflow_git_ref="${WORKFLOW_REF#*@}"
          python -m pip install "git+https://github.com/${workflow_repository}.git@${workflow_git_ref}"
      - name: Run planning validator
        run: planning-validator run --config "${{ inputs.config_path }}"
      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planning-validator-summary
          path: .planning-validator/run-summary.json
          if-no-files-found: warn
