name: reusable-planning-validator

on:
  workflow_call:
    inputs:
      config_path:
        required: true
        type: string
      python_version:
        required: false
        type: string
        default: "3.12"
    secrets:
      openai_api_key:
        required: false
      anthropic_api_key:
        required: false

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Validate target configuration
        run: planning-validator validate-config --config "${{ inputs.config_path }}"
