name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    env:
      COVERAGE_FILE: .coverage.py312
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Test
        run: coverage run -m pytest
      - name: Upload raw coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-agent-context-coverage-py312
          path: .coverage*
          include-hidden-files: true
          if-no-files-found: ignore

  release-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Validate documented target-repo example
        run: |
          planning-validator validate-config \
            --config examples/target-repo/.github/planning-validator.yml \
            --repo-root examples/target-repo
      - name: Build package artifacts
        run: python -m build

  coverage:
    runs-on: ubuntu-latest
    needs:
      - test
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install coverage
        run: |
          python -m pip install --upgrade pip
          python -m pip install "coverage[toml]"
      - name: Download raw coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pr-agent-context-coverage-*
          path: coverage-data
          merge-multiple: true
      - name: Combine coverage and generate reports
        run: |
          coverage combine coverage-data/
          coverage report | tee coverage-report.txt
          coverage xml -o coverage.xml
      - name: Upload combined coverage report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-agent-context-coverage-report
          path: |
            coverage.xml
            coverage-report.txt
          if-no-files-found: ignore

  pr-agent-context:
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - lint
      - test
      - release-gates
      - coverage
    permissions:
      contents: read
      actions: read
      pull-requests: write
    uses: shaypal5/pr-agent-context/.github/workflows/pr-agent-context.yml@v4
    with:
      tool_ref: v4
      target_patch_coverage: "100"
      include_patch_coverage: true
      patch_coverage_source_mode: coverage_xml_artifact
      coverage_report_artifact_name: pr-agent-context-coverage-report
      coverage_report_filename: coverage.xml
      prompt_template_file: .github/pr-agent-context-template.md
      debug_artifacts: true
